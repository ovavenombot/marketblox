<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — MarketBlox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css"/>
</head>
<body class="auth-body">

  <a href="index.html" class="auth-logo">
    <svg width="30" height="30" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="8" fill="#00c853"/>
      <rect x="6" y="6" width="7" height="7" rx="2" fill="white"/>
      <rect x="15" y="6" width="7" height="7" rx="2" fill="white" opacity="0.6"/>
      <rect x="6" y="15" width="7" height="7" rx="2" fill="white" opacity="0.6"/>
      <rect x="15" y="15" width="7" height="7" rx="2" fill="white"/>
    </svg>
    Market<b>Blox</b>
  </a>

  <div class="auth-card">
    <h1 class="auth-card-title">Register</h1>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="auth-field">
        <input type="text" id="regName" placeholder="Name" required autocomplete="name"/>
      </div>
      <div class="auth-field">
        <input type="email" id="regEmail" placeholder="Email" required autocomplete="email"/>
      </div>
      <div class="auth-field pw-field">
        <input type="password" id="regPassword" placeholder="Password" required minlength="6" autocomplete="new-password"/>
        <button type="button" class="pw-eye" onclick="togglePw('regPassword')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="auth-field pw-field">
        <input type="password" id="regConfirm" placeholder="Confirm Password" required autocomplete="new-password"/>
        <button type="button" class="pw-eye" onclick="togglePw('regConfirm')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <div class="auth-error" id="regError"></div>

      <button type="submit" class="auth-submit" id="regBtn">
        <span id="regBtnText">Register</span>
        <span class="auth-spinner" id="regSpinner"></span>
      </button>
    </form>

    <div class="auth-bottom">
      Already have an account? <a href="login.html" class="auth-link">Login</a>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
      getAuth,
      createUserWithEmailAndPassword,
      sendEmailVerification,
      updateProfile,
      onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import {
      getFirestore,
      doc,
      setDoc,
      serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const app  = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
      if (user && user.emailVerified) window.location.href = 'account.html';
    });

    window.handleRegister = async (e) => {
      e.preventDefault();
      const err  = document.getElementById('regError');
      const btn  = document.getElementById('regBtn');
      err.textContent = '';
      err.className = 'auth-error';

      const name = document.getElementById('regName').value.trim();
      const pw   = document.getElementById('regPassword').value;
      const pw2  = document.getElementById('regConfirm').value;

      if (!name) { err.textContent = 'Please enter your name.'; return; }
      if (pw !== pw2) { err.textContent = 'Passwords do not match.'; return; }

      setLoading(true);
      try {
        const cred = await createUserWithEmailAndPassword(
          auth,
          document.getElementById('regEmail').value.trim(),
          pw
        );
        await updateProfile(cred.user, { displayName: name });
        await setDoc(doc(db, 'users', cred.user.uid), {
          email:       cred.user.email,
          displayName: name,
          balance:     0,
          createdAt:   serverTimestamp(),
        });
        await sendEmailVerification(cred.user);
        await auth.signOut();

        // Go to verify page with email in URL
        const email = encodeURIComponent(document.getElementById('regEmail').value.trim());
        window.location.href = `verify.html?email=${email}`;
      } catch (ex) {
        err.textContent = friendlyError(ex.code);
        setLoading(false);
      }
    };

    function setLoading(on) {
      const btn = document.getElementById('regBtn');
      document.getElementById('regBtnText').style.display  = on ? 'none' : '';
      document.getElementById('regSpinner').style.display  = on ? 'inline-block' : 'none';
      btn.disabled = on;
    }

    function friendlyError(code) {
      const map = {
        'auth/email-already-in-use': 'An account with that email already exists.',
        'auth/invalid-email':        'Invalid email address.',
        'auth/weak-password':        'Password must be at least 6 characters.',
        'auth/network-request-failed': 'Network error. Check your connection.',
      };
      return map[code] || 'Something went wrong. Please try again.';
    }

    window.togglePw = (id) => {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
    };
  </script>
</body>
</html>
