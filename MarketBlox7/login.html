<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — MarketBlox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>

  <canvas id="particles"></canvas>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="#00c853"/>
          <rect x="6" y="6" width="7" height="7" rx="2" fill="white"/>
          <rect x="15" y="6" width="7" height="7" rx="2" fill="white" opacity="0.6"/>
          <rect x="6" y="15" width="7" height="7" rx="2" fill="white" opacity="0.6"/>
          <rect x="15" y="15" width="7" height="7" rx="2" fill="white"/>
        </svg>
      </div>
      <span>Market<b>Blox</b></span>
    </a>
    <div class="nav-right">
      <a href="index.html" class="nav-link">← Home</a>
    </div>
  </nav>

  <!-- LOGIN CARD -->
  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <svg width="36" height="36" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="#00c853"/>
          <rect x="6" y="6" width="7" height="7" rx="2" fill="white"/>
          <rect x="15" y="6" width="7" height="7" rx="2" fill="white" opacity="0.6"/>
          <rect x="6" y="15" width="7" height="7" rx="2" fill="white" opacity="0.6"/>
          <rect x="15" y="15" width="7" height="7" rx="2" fill="white"/>
        </svg>
        <span>Market<b>Blox</b></span>
      </div>

      <!-- TABS -->
      <div class="login-tabs">
        <button class="login-tab active" id="tabLogin" onclick="switchTab('login')">Log In</button>
        <button class="login-tab" id="tabSignup" onclick="switchTab('signup')">Create Account</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="loginPassword" placeholder="Your password" required autocomplete="current-password"/>
            <button type="button" class="pw-toggle" onclick="togglePw('loginPassword', this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="button" class="forgot-link" onclick="handleForgot()">Forgot password?</button>
        <button type="submit" class="auth-btn" id="loginBtn">
          <span class="auth-btn-text">Log In</span>
          <span class="auth-btn-spinner" style="display:none"></span>
        </button>
        <div class="auth-error" id="loginError"></div>
      </form>

      <!-- SIGNUP FORM -->
      <form id="signupForm" class="auth-form" style="display:none" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="signupPassword" placeholder="At least 6 characters" required autocomplete="new-password" minlength="6"/>
            <button type="button" class="pw-toggle" onclick="togglePw('signupPassword', this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="pw-wrap">
            <input type="password" id="signupConfirm" placeholder="Repeat password" required autocomplete="new-password"/>
            <button type="button" class="pw-toggle" onclick="togglePw('signupConfirm', this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="auth-btn" id="signupBtn">
          <span class="auth-btn-text">Create Account</span>
          <span class="auth-btn-spinner" style="display:none"></span>
        </button>
        <div class="auth-error" id="signupError"></div>
        <p class="auth-legal">By creating an account you agree to our <a href="#">Terms of Service</a>.</p>
      </form>

    </div>
  </div>

  <script src="script.js"></script>
  <script src="firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      sendPasswordResetEmail,
      sendEmailVerification,
      onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import {
      getFirestore,
      doc,
      setDoc,
      serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const app  = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // If already logged in and verified, redirect to account
    onAuthStateChanged(auth, (user) => {
      if (user && user.emailVerified) window.location.href = 'account.html';
    });

    window.handleLogin = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      err.textContent = '';
      setLoading(btn, true);
      try {
        const cred = await signInWithEmailAndPassword(
          auth,
          document.getElementById('loginEmail').value.trim(),
          document.getElementById('loginPassword').value
        );
        if (!cred.user.emailVerified) {
          await auth.signOut();
          err.textContent = 'Please verify your email first. Check your inbox for the verification link.';
          setLoading(btn, false);
          return;
        }
        window.location.href = 'account.html';
      } catch (ex) {
        err.textContent = friendlyError(ex.code);
        setLoading(btn, false);
      }
    };

    window.handleSignup = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('signupBtn');
      const err = document.getElementById('signupError');
      err.textContent = '';
      const pw  = document.getElementById('signupPassword').value;
      const pw2 = document.getElementById('signupConfirm').value;
      if (pw !== pw2) { err.textContent = 'Passwords do not match.'; return; }
      setLoading(btn, true);
      try {
        const cred = await createUserWithEmailAndPassword(
          auth,
          document.getElementById('signupEmail').value.trim(),
          pw
        );
        // Create user doc in Firestore
        await setDoc(doc(db, 'users', cred.user.uid), {
          email:     cred.user.email,
          balance:   0,
          createdAt: serverTimestamp(),
        });
        // Send verification email
        await sendEmailVerification(cred.user);
        // Sign out and show confirmation instead of redirecting
        await auth.signOut();
        err.style.color = '#00c853';
        err.textContent = '✅ Account created! Check your email and click the verification link, then log in.';
        setLoading(btn, false);
        document.getElementById('signupForm').querySelectorAll('input').forEach(i => i.value = '');
      } catch (ex) {
        err.style.color = '';
        err.textContent = friendlyError(ex.code);
        setLoading(btn, false);
      }
    };

    window.handleForgot = async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const err   = document.getElementById('loginError');
      if (!email) { err.textContent = 'Enter your email first.'; return; }
      try {
        await sendPasswordResetEmail(auth, email);
        err.style.color = '#00c853';
        err.textContent = 'Reset link sent! Check your inbox.';
      } catch (ex) {
        err.style.color = '';
        err.textContent = friendlyError(ex.code);
      }
    };

    function setLoading(btn, on) {
      btn.querySelector('.auth-btn-text').style.display    = on ? 'none' : '';
      btn.querySelector('.auth-btn-spinner').style.display = on ? 'inline-block' : 'none';
      btn.disabled = on;
    }

    function friendlyError(code) {
      const map = {
        'auth/invalid-email':          'Invalid email address.',
        'auth/user-not-found':         'No account with that email.',
        'auth/wrong-password':         'Incorrect password.',
        'auth/email-already-in-use':   'Email already has an account — try logging in.',
        'auth/weak-password':          'Password must be at least 6 characters.',
        'auth/too-many-requests':      'Too many attempts. Try again later.',
        'auth/network-request-failed': 'Network error. Check your connection.',
        'auth/invalid-credential':     'Incorrect email or password.',
      };
      return map[code] || 'Something went wrong. Please try again.';
    }
  </script>

  <script>
    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('loginForm').style.display   = isLogin ? '' : 'none';
      document.getElementById('signupForm').style.display  = isLogin ? 'none' : '';
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabSignup').classList.toggle('active', !isLogin);
    }

    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.style.opacity = show ? '1' : '0.4';
    }
  </script>
</body>
</html>
