<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — MarketBlox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css"/>
</head>
<body class="auth-body">

  <a href="index.html" class="auth-logo">
    <svg width="30" height="30" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="8" fill="#00c853"/>
      <rect x="6" y="6" width="7" height="7" rx="2" fill="white"/>
      <rect x="15" y="6" width="7" height="7" rx="2" fill="white" opacity="0.6"/>
      <rect x="6" y="15" width="7" height="7" rx="2" fill="white" opacity="0.6"/>
      <rect x="15" y="15" width="7" height="7" rx="2" fill="white"/>
    </svg>
    Market<b>Blox</b>
  </a>

  <div class="auth-card">
    <h1 class="auth-card-title">Login</h1>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="auth-field">
        <input type="email" id="loginEmail" placeholder="Email" required autocomplete="email"/>
      </div>
      <div class="auth-field pw-field">
        <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password"/>
        <button type="button" class="pw-eye" onclick="togglePw('loginPassword')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <div class="auth-row">
        <label class="keep-me">
          <input type="checkbox" id="keepMe"/> Keep me logged in
        </label>
        <button type="button" class="auth-link" onclick="handleForgot()">Forgot Password?</button>
      </div>

      <div class="auth-error" id="loginError"></div>

      <button type="submit" class="auth-submit" id="loginBtn">
        <span id="loginBtnText">Login</span>
        <span class="auth-spinner" id="loginSpinner"></span>
      </button>
    </form>

    <div class="auth-bottom">
      Don't have an account? <a href="register.html" class="auth-link">Register</a>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
      getAuth,
      signInWithEmailAndPassword,
      sendPasswordResetEmail,
      onAuthStateChanged,
      browserLocalPersistence,
      browserSessionPersistence,
      setPersistence
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    const app  = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user && user.emailVerified) window.location.href = 'account.html';
    });

    window.handleLogin = async (e) => {
      e.preventDefault();
      const err  = document.getElementById('loginError');
      const btn  = document.getElementById('loginBtn');
      err.textContent = '';
      err.className = 'auth-error';
      setLoading(btn, 'loginBtnText', 'loginSpinner', true);

      const keepMe = document.getElementById('keepMe').checked;
      try {
        await setPersistence(auth, keepMe ? browserLocalPersistence : browserSessionPersistence);
        const cred = await signInWithEmailAndPassword(
          auth,
          document.getElementById('loginEmail').value.trim(),
          document.getElementById('loginPassword').value
        );
        if (!cred.user.emailVerified) {
          await auth.signOut();
          err.textContent = 'Please verify your email first. Check your inbox for the verification link.';
          setLoading(btn, 'loginBtnText', 'loginSpinner', false);
          return;
        }
        window.location.href = 'account.html';
      } catch (ex) {
        err.textContent = friendlyError(ex.code);
        setLoading(btn, 'loginBtnText', 'loginSpinner', false);
      }
    };

    window.handleForgot = async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const err   = document.getElementById('loginError');
      if (!email) { err.textContent = 'Enter your email first.'; return; }
      try {
        await sendPasswordResetEmail(auth, email);
        err.className = 'auth-error auth-success';
        err.textContent = 'Reset link sent! Check your inbox.';
      } catch (ex) {
        err.className = 'auth-error';
        err.textContent = friendlyError(ex.code);
      }
    };

    function setLoading(btn, textId, spinnerId, on) {
      document.getElementById(textId).style.display    = on ? 'none' : '';
      document.getElementById(spinnerId).style.display = on ? 'inline-block' : 'none';
      btn.disabled = on;
    }

    function friendlyError(code) {
      const map = {
        'auth/invalid-email':        'Invalid email address.',
        'auth/user-not-found':       'No account with that email.',
        'auth/wrong-password':       'Incorrect password.',
        'auth/too-many-requests':    'Too many attempts. Try again later.',
        'auth/invalid-credential':   'Incorrect email or password.',
        'auth/network-request-failed': 'Network error. Check your connection.',
      };
      return map[code] || 'Something went wrong. Please try again.';
    }

    window.togglePw = (id) => {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
    };
  </script>
</body>
</html>
