[build]
  command = "cd MarketBlox7 && npm install"
  publish = "MarketBlox7"
  functions = "MarketBlox7/netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "MarketBlox7/firebase-config.js"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/checkout"
  status = 200
